<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 170" font-family="monospace" font-size="11">
  <style>
    .bg { fill: #0d1117; }
    .box { fill: #1a1a2e; stroke-width: 2; rx: 6; }
    .t { fill: #e0e0e0; text-anchor: middle; dominant-baseline: central; }
    .ts { fill: #888; text-anchor: middle; dominant-baseline: central; font-size: 10; }
    .file { fill: #161b22; stroke: #333; stroke-width: 1; rx: 4; }
    .arrow { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#ah2); }
    @keyframes fileAppear1 { 0%,30% { opacity: 0; transform: translateY(5px); } 45%,100% { opacity: 1; transform: translateY(0); } }
    @keyframes fileAppear2 { 0%,40% { opacity: 0; transform: translateY(5px); } 55%,100% { opacity: 1; transform: translateY(0); } }
    @keyframes fileAppear3 { 0%,50% { opacity: 0; transform: translateY(5px); } 65%,100% { opacity: 1; transform: translateY(0); } }
    @keyframes fileAppear4 { 0%,60% { opacity: 0; transform: translateY(5px); } 75%,100% { opacity: 1; transform: translateY(0); } }
  </style>
  <defs>
    <marker id="ah2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <rect class="bg" width="700" height="170" rx="12"/>

  <!-- SliceReport box -->
  <rect class="box" x="20" y="40" width="140" height="90" stroke="#00d4ff"/>
  <text class="t" x="90" y="65" font-size="12">SliceReport</text>
  <text class="ts" x="90" y="85">.to_mlflow()</text>
  <text class="ts" x="90" y="100">one line call</text>

  <!-- Arrow -->
  <line class="arrow" x1="160" y1="85" x2="230" y2="85"/>

  <!-- MLflow box -->
  <rect class="box" x="235" y="25" width="130" height="120" stroke="#ffa94d"/>
  <text class="t" x="300" y="45" fill="#ffa94d" font-size="12">MLflow</text>
  <text class="ts" x="300" y="65">artifacts/</text>
  <text class="ts" x="300" y="80">slice_eval/</text>

  <!-- Arrow -->
  <line class="arrow" x1="365" y1="85" x2="420" y2="85"/>

  <!-- File outputs -->
  <g style="animation: fileAppear1 5s ease-out infinite;">
    <rect class="file" x="425" y="20" width="260" height="28"/>
    <text class="ts" x="555" y="37" fill="#51cf66">slice_report.csv — full matrix</text>
  </g>
  <g style="animation: fileAppear2 5s ease-out infinite;">
    <rect class="file" x="425" y="55" width="260" height="28"/>
    <text class="ts" x="555" y="72" fill="#ffa94d">worst_slices.csv — top 10 worst</text>
  </g>
  <g style="animation: fileAppear3 5s ease-out infinite;">
    <rect class="file" x="425" y="90" width="260" height="28"/>
    <text class="ts" x="555" y="107" fill="#00d4ff">global_metrics.json</text>
  </g>
  <g style="animation: fileAppear4 5s ease-out infinite;">
    <rect class="file" x="425" y="125" width="260" height="28"/>
    <text class="ts" x="555" y="142" fill="#888">slice_summary.json</text>
  </g>
</svg>
