<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 280" font-family="monospace" font-size="11">
  <style>
    .bg { fill: #0d1117; }
    .t { fill: #e0e0e0; font-size: 11; dominant-baseline: central; }
    .tl { fill: #888; font-size: 10; text-anchor: end; dominant-baseline: central; }
    .ax { stroke: #333; stroke-width: 1; }
    .grid { stroke: #1a1f27; stroke-width: 1; }
    .err { stroke: #e0e0e0; stroke-width: 1.5; }
    @keyframes grow1 { 0%,5% { width: 0; } 25%,100% { width: 145; } }
    @keyframes grow2 { 0%,10% { width: 0; } 35%,100% { width: 195; } }
    @keyframes grow3 { 0%,15% { width: 0; } 45%,100% { width: 215; } }
    @keyframes grow4 { 0%,20% { width: 0; } 55%,100% { width: 290; } }
    @keyframes grow5 { 0%,25% { width: 0; } 65%,100% { width: 340; } }
    @keyframes dashDraw { 0% { stroke-dashoffset: 280; } 50%,100% { stroke-dashoffset: 0; } }
  </style>

  <rect class="bg" width="650" height="280" rx="12"/>
  <text x="325" y="20" fill="#e0e0e0" text-anchor="middle" font-size="13" font-weight="bold">Worst Slices by F1 — report.plot()</text>

  <!-- Y axis labels -->
  <text class="tl" x="148" y="60">sensor_b_night</text>
  <text class="tl" x="148" y="105">hour≤5 (auto)</text>
  <text class="tl" x="148" y="150">sensor_b</text>
  <text class="tl" x="148" y="195">temp>80 (auto)</text>
  <text class="tl" x="148" y="240">sensor_a</text>

  <!-- Grid lines -->
  <line class="grid" x1="155" y1="40" x2="155" y2="260"/>
  <line class="grid" x1="270" y1="40" x2="270" y2="260"/>
  <line class="grid" x1="385" y1="40" x2="385" y2="260"/>
  <line class="grid" x1="500" y1="40" x2="500" y2="260"/>
  <line class="grid" x1="615" y1="40" x2="615" y2="260"/>

  <!-- X axis labels -->
  <text class="t" x="155" y="275" text-anchor="middle" fill="#666">0.0</text>
  <text class="t" x="270" y="275" text-anchor="middle" fill="#666">0.25</text>
  <text class="t" x="385" y="275" text-anchor="middle" fill="#666">0.5</text>
  <text class="t" x="500" y="275" text-anchor="middle" fill="#666">0.75</text>
  <text class="t" x="615" y="275" text-anchor="middle" fill="#666">1.0</text>

  <!-- Bars -->
  <rect x="155" y="48" height="24" fill="#ff6b6b" rx="3" style="animation: grow1 5s ease-out infinite;"/>
  <rect x="155" y="93" height="24" fill="#ff6b6b" rx="3" style="animation: grow2 5s ease-out infinite;"/>
  <rect x="155" y="138" height="24" fill="#ffa94d" rx="3" style="animation: grow3 5s ease-out infinite;"/>
  <rect x="155" y="183" height="24" fill="#ffa94d" rx="3" style="animation: grow4 5s ease-out infinite;"/>
  <rect x="155" y="228" height="24" fill="#51cf66" rx="3" style="animation: grow5 5s ease-out infinite;"/>

  <!-- Error bars (CI) -->
  <line class="err" x1="117" y1="60" x2="173" y2="60"/>
  <line class="err" x1="117" y1="56" x2="117" y2="64"/>
  <line class="err" x1="173" y1="56" x2="173" y2="64"/>

  <line class="err" x1="155" y1="105" x2="233" y2="105"/>
  <line class="err" x1="155" y1="101" x2="155" y2="109"/>
  <line class="err" x1="233" y1="101" x2="233" y2="109"/>

  <line class="err" x1="195" y1="150" x2="253" y2="150"/>
  <line class="err" x1="195" y1="146" x2="195" y2="154"/>
  <line class="err" x1="253" y1="146" x2="253" y2="154"/>

  <line class="err" x1="265" y1="195" x2="325" y2="195"/>
  <line class="err" x1="265" y1="191" x2="265" y2="199"/>
  <line class="err" x1="325" y1="191" x2="325" y2="199"/>

  <line class="err" x1="325" y1="240" x2="358" y2="240"/>
  <line class="err" x1="325" y1="236" x2="325" y2="244"/>
  <line class="err" x1="358" y1="236" x2="358" y2="244"/>

  <!-- Global baseline -->
  <line x1="523" y1="38" x2="523" y2="262" stroke="#51cf66" stroke-width="1.5" stroke-dasharray="280" style="animation: dashDraw 5s ease-out infinite;"/>
  <text x="528" y="42" fill="#51cf66" font-size="9">Global F1=0.91</text>
</svg>
